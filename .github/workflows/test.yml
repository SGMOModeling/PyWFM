name: tests

on:
  push:
    branches: [master, "0.2.x", "0.3.x"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

jobs:
  test:
    name: ${{ matrix.iwfm_api_version }} / py${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # cadwr-sgmo conda labels — these are NOT identical to upstream
        # CNRA labels for some 2015-series builds. Build numbers (the last
        # component) are stable across both, but major.minor labels diverge:
        #   conda 2015.0.1273  ↔  CNRA iwfm-2015.1.1273.zip  (build 1273)
        #   conda 2015.0.1403  ↔  CNRA iwfm-2015.0.1403.zip  (build 1403)
        #   conda 2015.1.1443  ↔  CNRA iwfm-2015.3.1443.zip  (build 1443)
        #   conda 2024.2.1594  ↔  CNRA iwfm-2024.2.1594.zip  (build 1594)
        #   conda 2025.0.1747  ↔  CNRA iwfm-2025.0.1747.zip  (build 1747)
        # The DLL itself self-reports the CNRA label via IW_GetVersion, so
        # the sample_dir fixture in tests/conftest.py picks the SampleModel
        # by CNRA label (= directory name), not the conda label installed
        # below. Don't try to "normalize" the matrix labels — these are what
        # cadwr-sgmo publishes and conda install needs.
        iwfm_api_version:
          - 2015.0.1273
          - 2015.0.1403
          - 2015.1.1443
          - 2024.2.1594
          - 2025.0.1747
        python-version: ["3.8"]

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v6

      - uses: conda-incubator/setup-miniconda@v4
        with:
          python-version: ${{ matrix.python-version }}
          channels: cadwr-sgmo,conda-forge
          channel-priority: strict
          # auto-activate-base was deprecated in setup-miniconda v3.3 and
          # removed in v4 — the replacement is auto-activate. We're
          # activating a named env (pywfm-test) below, so base activation
          # is irrelevant; setting false is just defensive.
          auto-activate: false
          activate-environment: pywfm-test
          # Suppress the implicit-defaults-channel warning. We resolve
          # iwfmdll from cadwr-sgmo and everything else from conda-forge;
          # the defaults channel is neither needed nor licensed for free
          # commercial use under the current Anaconda terms.
          conda-remove-defaults: "true"

      - name: Install IWFM DLL
        run: conda install -y iwfmdll==${{ matrix.iwfm_api_version }}

      - name: Install pywfm + test deps
        # Non-editable install: pywfm/__init__.py resolves the IWFM DLL
        # via a relative path from its own location (../../../../Library/bin),
        # which lands in <env>/Library/bin only when the package is in
        # site-packages. An editable install leaves __init__.py under the
        # source tree where that relative path resolves outside the env
        # and the DLL lookup fails.
        run: pip install ".[test]"

      # Cache the simulated Results/ across runs. simulate_all runs once per
      # session via the _ensure_results fixture; cached output keeps wall time
      # down on subsequent runs as long as inputs and DLL version match. The
      # cache restores all five SampleModel Results dirs but only the one
      # matching the loaded DLL version actually gets populated per run.
      - name: Cache SampleModel Results
        uses: actions/cache@v5
        with:
          path: |
            tests/data/sample_model/2015.1.1273/Results
            tests/data/sample_model/2015.0.1403/Results
            tests/data/sample_model/2015.3.1443/Results
            tests/data/sample_model/2024.2.1594/Results
            tests/data/sample_model/2025.0.1747/Results
          key: results-${{ matrix.iwfm_api_version }}-${{ hashFiles('tests/data/sample_model/*/Preprocessor/**', 'tests/data/sample_model/*/Simulation/**') }}

      # Default suite: unit + integration + regression. Skips slow (C2VSimCG,
      # not vendored on CI) and simulation (kernel-state collisions with
      # inquiry-mode tests force a separate invocation — see below).
      - name: Run default suite
        run: pytest tests/ -ra

      # Simulation-mode tests run in a dedicated process. The IWFM kernel's
      # simulation bookkeeping is a process-wide singleton that doesn't fully
      # reset on kill(), so a second IWFMModel(is_for_inquiry=0) in the same
      # process crashes the Fortran runtime. Splitting the invocation also
      # ensures inquiry-mode tests above ran against an untouched fixture.
      - name: Run simulation-mode tests
        run: pytest --runsim tests/integration/model/test_simulation.py -ra
